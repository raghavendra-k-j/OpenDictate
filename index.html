<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>OpenDictate</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' blob:">
  </head>
  <body>
    <div id="app">
      <!-- Sidebar -->
      <aside id="sidebar">
        <div class="sidebar-header">
          <span class="logo-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </span>
          <span class="logo-text">OpenDictate</span>
        </div>

        <button id="new-note-btn" class="btn-new-note">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New note
        </button>

        <nav id="notes-list" class="notes-list"></nav>

        <div class="sidebar-footer">
          <div id="config-badge" class="config-badge disconnected">
            <span class="config-dot"></span>
            <span id="config-badge-text">Not connected</span>
          </div>
          <button id="settings-btn" class="btn-icon" title="Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </aside>

      <!-- Main content -->
      <main id="main-panel">
        <!-- Empty state -->
        <div id="empty-state" class="empty-state">
          <div class="empty-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </div>
          <h2>Welcome to OpenDictate</h2>
          <p>Create a new note to start dictating. Press <kbd>Ctrl+Shift+Space</kbd> to record.</p>
        </div>

        <!-- Note view -->
        <div id="note-view" class="note-view" style="display:none">
          <header class="note-header">
            <input id="note-title" class="note-title-input" type="text" placeholder="Untitled note" spellcheck="false" />
            <div class="note-actions">
              <span id="recording-indicator" class="rec-indicator" style="display:none">
                <span class="rec-dot"></span>
                <span class="rec-label">REC</span>
              </span>
              <button id="record-btn" class="btn-record" title="Start recording (Ctrl+Shift+Space)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
              </button>
              <button id="delete-note-btn" class="btn-icon btn-danger" title="Delete note">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </div>
          </header>

          <div id="entries-container" class="entries-container"></div>

          <div id="note-status" class="note-status">
            <span id="save-status">All changes saved</span>
          </div>
        </div>
      </main>

      <!-- Settings modal -->
      <div id="settings-modal" class="modal-overlay" style="display:none">
        <div class="modal">
          <div class="modal-header">
            <h2>Settings</h2>
            <button id="close-settings" class="btn-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div class="modal-body">
            <label class="field-label">Transcription cURL</label>
            <p class="field-hint">
              Open ChatGPT &rarr; F12 &rarr; Network tab &rarr; make a voice recording &rarr;
              right-click the <code>transcribe</code> request &rarr; <strong>Copy as cURL</strong>.
            </p>
            <textarea id="curl-input" rows="5" placeholder="Paste cURL command here..." spellcheck="false"></textarea>
            <div class="modal-actions">
              <button id="save-curl-btn" class="btn-primary">Save</button>
              <button id="clear-curl-btn" class="btn-subtle">Clear config</button>
            </div>
            <div id="settings-status" class="settings-msg"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
